<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What's for Dinner?</title>
    <link rel="icon" type="image/svg+xml" sizes="any" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ctext y=%22.9em%22 font-size=%2290%22%3E🍜%3C/text%3E%3C/svg%3E"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="d-flex justify-content-center p-5">
    <div id="form-container" class="container">
        <div class="card p-5 border-3 rounded-4 text-center">
            <h1 class="mt-3">What's for Dinner?</h1>
            <p class="text-muted">Enter what's in your fridge, and I'll suggest a recipe!</p>
            <div class="m-3 text-start">
                <label for="ingredients" class="form-label mb-3"><b>Ingredients (please separate each ingredient by commas):</b></label>
                <textarea id="ingredients" class="form-control" rows="3" placeholder="e.g., chicken, rice, tomatoes, eggs"></textarea>
            </div>
            <div class="m-3 text-start">
                <label for="diet" class="form-label mb-3"><b>Dietary Restrictions (Optional):</b></label>
                <select id="diet" class="form-select">
                    <option value="none">None</option>
                    <option value="gluten-free">Gluten Free</option>
                    <option value="ketogenic">Ketogenic</option>
                    <option value="vegetarian">Vegetarian</option>
                    <option value="vegan">Vegan</option>
                    <option value="pescetarian">Pescetarian</option>
                    <option value="paleo">Paleo</option>
                    <option value="primal">Primal</option>
                </select>
            </div>
            <button id="find-recipes-button" class="btn btn-primary mt-3">Find Recipes</button>
            <p class="text-center text-muted m-3">(Verify All Recipe Links Before Visiting)</p>
            <div id="loadingText" class="text-success m-3 hidden"><b>Loading...</b></div>
            <div id="resultsContainer" class="text-center"></div>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
